<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids English - Magic Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fff7ed;
            background-image: radial-gradient(#ffedd5 2px, transparent 2px);
            background-size: 30px 30px;
            overflow-x: hidden;
        }
        .perspective {
            perspective: 1500px;
        }
        .card-stack {
            position: relative;
            width: 320px;
            height: 480px;
            margin: 0 auto;
        }
        /* Stack effect decorations */
        .card-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 2rem;
            background: white;
            border: 4px solid #f1f5f9;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 0;
        }
        .dec-1 { transform: translate(10px, 10px) rotate(2deg); opacity: 0.8; }
        .dec-2 { transform: translate(-8px, 5px) rotate(-3deg); opacity: 0.5; }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
            z-index: 10;
        }
        .flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 8px solid white;
        }
        .flip-card-front {
            background: linear-gradient(135deg, #fb923c 0%, #f43f5e 100%);
        }
        .flip-card-back {
            background: white;
            transform: rotateY(180deg);
            color: #1e293b;
        }
        
        /* Card transition animations */
        .slide-out {
            animation: slideOut 0.5s forwards ease-in-out;
        }
        @keyframes slideOut {
            0% { transform: translateX(0) rotate(0); opacity: 1; }
            100% { transform: translateX(500px) rotate(20deg); opacity: 0; }
        }
        .slide-in {
            animation: slideIn 0.5s forwards ease-out;
        }
        @keyframes slideIn {
            0% { transform: translateY(-50px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .speaking {
            animation: pulse-ring 1s infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .img-container {
            width: 100%;
            height: 160px;
            overflow: hidden;
            border-radius: 1rem;
            margin-bottom: 1rem;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Custom Range Slider */
        input[type=range] {
            accent-color: #f97316;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="flex-1 max-w-4xl mx-auto w-full p-4 flex flex-col">
        <!-- Header -->
        <header class="text-center my-6">
            <h1 class="text-4xl md:text-5xl font-bold text-orange-600 drop-shadow-sm">
                Magic Deck 🃏
            </h1>
            <p class="text-slate-500 font-medium italic">Flip a card to discover a new question!</p>
            
            <button onclick="toggleAdmin()" id="adminBtn" class="mt-4 bg-white/50 border border-orange-200 text-orange-600 px-4 py-1.5 rounded-full text-sm font-bold hover:bg-white transition shadow-sm inline-flex items-center gap-2">
                <span>⚙️ Teacher's Panel</span>
            </button>
        </header>

        <!-- Admin Section -->
        <section id="adminSection" class="hidden bg-white p-6 rounded-3xl shadow-xl mb-8 border-4 border-orange-100 animate-slide-in">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Manage Questions -->
                <div>
                    <h2 class="text-xl font-bold mb-4 text-slate-800 flex items-center gap-2">📝 Manage Questions</h2>
                    <div class="flex flex-col gap-3 mb-4">
                        <input type="text" id="newQuestion" placeholder="Type a question..." class="border-2 border-slate-100 p-3 rounded-xl focus:border-orange-400 outline-none">
                        <div class="flex gap-2">
                            <input type="text" id="newImage" placeholder="Image URL (Optional)" class="flex-1 border-2 border-slate-100 p-3 rounded-xl focus:border-orange-400 outline-none">
                            <button onclick="addQuestion()" class="bg-orange-500 text-white px-8 rounded-xl font-bold hover:bg-orange-600 shadow-md transition">Add</button>
                        </div>
                    </div>
                    <div id="questionList" class="grid grid-cols-1 gap-2 max-h-48 overflow-y-auto p-1 text-sm">
                        <!-- Items render here -->
                    </div>
                </div>

                <!-- Voice Settings -->
                <div class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
                    <h2 class="text-lg font-bold mb-4 text-slate-800 flex items-center gap-2">🔊 Voice Settings</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Select Voice</label>
                            <select id="voiceSelect" class="w-full border-2 border-white p-2 rounded-lg outline-none focus:border-orange-400 text-sm">
                                <option value="">Loading voices...</option>
                            </select>
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-xs font-bold text-slate-500 uppercase">Speaking Speed</label>
                                <span id="speedValue" class="text-xs font-bold text-orange-600 bg-orange-100 px-2 py-0.5 rounded">1.0x</span>
                            </div>
                            <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                            <div class="flex justify-between text-[10px] text-slate-400 mt-1">
                                <span>Slow</span>
                                <span>Fast</span>
                            </div>
                        </div>

                        <button onclick="testVoice()" class="w-full py-2 border-2 border-orange-200 text-orange-600 rounded-xl text-xs font-bold hover:bg-orange-50 transition">
                            Test Voice 🎧
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Game Section - Central Deck -->
        <main class="flex-1 flex flex-col items-center justify-center relative">
            <div id="emptyState" class="hidden text-center p-10 bg-white/50 rounded-3xl border-4 border-dashed border-orange-200">
                <span class="text-6xl mb-4 block">📭</span>
                <p class="text-slate-400 font-bold text-xl">Out of cards!<br>Please add more questions above.</p>
            </div>

            <div id="gameContent" class="w-full flex flex-col items-center">
                <div class="card-stack perspective" id="deckContainer">
                    <!-- Stack decorations -->
                    <div class="card-decoration dec-1"></div>
                    <div class="card-decoration dec-2"></div>
                    
                    <!-- Main Active Card -->
                    <div id="activeCard" class="flip-card-inner-container w-full h-full">
                        <!-- Card content injected by JS -->
                    </div>
                </div>

                <!-- Controls -->
                <div class="mt-12 flex flex-col sm:flex-row gap-4 items-center">
                    <div class="bg-white px-6 py-2 rounded-full shadow-md border-2 border-orange-100 order-2 sm:order-1">
                        <span class="text-orange-600 font-bold" id="cardCounter">Card 1 / 5</span>
                    </div>
                    <button onclick="nextCard()" class="bg-gradient-to-r from-orange-400 to-red-500 text-white px-10 py-4 rounded-2xl font-bold text-xl shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-2 order-1 sm:order-2">
                        Next Question ➔
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Background decoration -->
    <div class="fixed top-10 left-10 text-6xl opacity-20 pointer-events-none">🎈</div>
    <div class="fixed bottom-10 right-10 text-6xl opacity-20 pointer-events-none">🧸</div>

    <script>
        let questions = [
            { text: "What is your favorite animal?", image: "" },
            { text: "Can you hop like a rabbit?", image: "https://images.unsplash.com/photo-1585110396000-c9ffd4e4b308?auto=format&fit=crop&q=80&w=400" },
            { text: "How many fingers do you have?", image: "" },
            { text: "What color is the sky?", image: "https://images.unsplash.com/photo-1506126279646-a697353d3166?auto=format&fit=crop&q=80&w=400" },
            { text: "Do you like eating apples?", image: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?auto=format&fit=crop&q=80&w=400" }
        ];

        let currentIndex = 0;
        let isFlipped = false;
        let voices = [];
        const icons = ['🐶', '🐱', '🐘', '🐯', '🦒', '🦁', '🐸', '🐼', '🐵', '🐷', '🦄', '🐝'];

        function init() {
            renderQuestions();
            updateGame();
            initVoices();
            
            // Speed range listener
            document.getElementById('speedRange').addEventListener('input', (e) => {
                document.getElementById('speedValue').innerText = e.target.value + 'x';
            });
        }

        function initVoices() {
            const synth = window.speechSynthesis;
            const voiceSelect = document.getElementById('voiceSelect');

            const loadVoices = () => {
                voices = synth.getVoices();
                // Filter for English voices primarily
                const englishVoices = voices.filter(v => v.lang.includes('en'));
                
                voiceSelect.innerHTML = englishVoices.map((v, i) => 
                    `<option value="${v.name}" ${v.default ? 'selected' : ''}>${v.name} (${v.lang})</option>`
                ).join('');
                
                if (englishVoices.length === 0) {
                    voiceSelect.innerHTML = voices.map((v, i) => 
                        `<option value="${v.name}">${v.name} (${v.lang})</option>`
                    ).join('');
                }
            };

            loadVoices();
            if (synth.onvoiceschanged !== undefined) {
                synth.onvoiceschanged = loadVoices;
            }
        }

        function toggleAdmin() {
            const section = document.getElementById('adminSection');
            const btn = document.getElementById('adminBtn');
            section.classList.toggle('hidden');
            const isHidden = section.classList.contains('hidden');
            btn.innerHTML = isHidden ? '<span>⚙️ Teacher\'s Panel</span>' : '<span>❌ Close Settings</span>';
        }

        function addQuestion() {
            const inputQ = document.getElementById('newQuestion');
            const inputI = document.getElementById('newImage');
            const text = inputQ.value.trim();
            const image = inputI.value.trim();

            if (text) {
                questions.push({ text, image });
                inputQ.value = '';
                inputI.value = '';
                renderQuestions();
                updateGame();
            }
        }

        function removeQuestion(index) {
            questions.splice(index, 1);
            if (currentIndex >= questions.length) currentIndex = Math.max(0, questions.length - 1);
            renderQuestions();
            updateGame();
        }

        function renderQuestions() {
            const list = document.getElementById('questionList');
            list.innerHTML = questions.map((q, i) => `
                <div class="flex justify-between items-center bg-white p-2 rounded-lg border shadow-sm">
                    <span class="truncate pr-2 flex items-center gap-2">
                        ${i + 1}. ${q.image ? '🖼️' : '📝'} ${q.text}
                    </span>
                    <button onclick="removeQuestion(${i})" class="text-red-400 hover:text-red-600 font-bold px-2">✕</button>
                </div>
            `).join('');
        }

        function flipCard() {
            const cardInner = document.querySelector('.flip-card-inner');
            if (!cardInner) return;
            isFlipped = !isFlipped;
            if (isFlipped) {
                cardInner.parentElement.classList.add('flipped');
            } else {
                cardInner.parentElement.classList.remove('flipped');
            }
        }

        function nextCard() {
            if (questions.length === 0) return;
            
            const cardElement = document.getElementById('activeCard');
            cardElement.classList.add('slide-out');
            
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                isFlipped = false;
                updateGame();
                cardElement.classList.remove('slide-out');
                cardElement.classList.add('slide-in');
                setTimeout(() => cardElement.classList.remove('slide-in'), 500);
            }, 400);
        }

        function updateGame() {
            const content = document.getElementById('gameContent');
            const empty = document.getElementById('emptyState');
            const cardContainer = document.getElementById('activeCard');
            const counter = document.getElementById('cardCounter');

            if (questions.length === 0) {
                content.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            content.classList.remove('hidden');
            empty.classList.add('hidden');
            counter.innerText = `Card ${currentIndex + 1} / ${questions.length}`;

            const qObj = questions[currentIndex];
            const icon = icons[currentIndex % icons.length];

            cardContainer.innerHTML = `
                <div class="flip-card-inner w-full h-full" onclick="flipCard()">
                    <!-- Front Side -->
                    <div class="flip-card-front text-white flex-col gap-6">
                        <div class="w-32 h-32 bg-white/20 rounded-full flex items-center justify-center text-6xl shadow-inner animate-pulse">
                            ${icon}
                        </div>
                        <div class="space-y-2">
                            <p class="font-bold text-3xl">Flip Me!</p>
                            <p class="text-white/80 font-semibold italic">Tap to see the question</p>
                        </div>
                    </div>
                    <!-- Back Side -->
                    <div class="flip-card-back flex-col p-6">
                        <div class="img-container">
                            ${qObj.image 
                                ? `<img src="${qObj.image}" alt="Question Image" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x200?text=No+Image'">` 
                                : `<span class="text-6xl">${icon}</span>`
                            }
                        </div>
                        <p class="text-xl font-bold text-slate-800 leading-tight mb-6 px-2">${qObj.text}</p>
                        
                        <button 
                            onclick="speak('${qObj.text.replace(/'/g, "\\'")}', event)" 
                            class="w-20 h-20 bg-blue-500 rounded-full flex items-center justify-center shadow-xl hover:bg-blue-600 transition-all transform hover:scale-110 active:scale-90 group relative"
                            id="speakBtn"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                    </div>
                </div>
            `;
            
            cardContainer.classList.remove('flipped');
        }

        function speak(text, event) {
            if (event) event.stopPropagation();
            if (!window.speechSynthesis) return;

            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            const speed = document.getElementById('speedRange').value;
            const selectedVoiceName = document.getElementById('voiceSelect').value;
            
            // Apply settings
            utterance.rate = parseFloat(speed);
            utterance.pitch = 1.1;
            
            const selectedVoice = voices.find(v => v.name === selectedVoiceName);
            if (selectedVoice) {
                utterance.voice = selectedVoice;
            } else {
                utterance.lang = 'en-US';
            }

            const btn = document.getElementById('speakBtn') || document.activeElement;
            btn.classList.add('speaking');
            
            utterance.onend = () => {
                btn.classList.remove('speaking');
            };

            window.speechSynthesis.speak(utterance);
        }

        function testVoice() {
            speak("Hello! How is my voice sound?");
        }

        window.onload = init;
    </script>
</body>
</html>
